[package]
name             = "psk-recorder"
version          = "0.4.0"
contract_version = "0.8"
license          = "MIT"

# Configuration interview (CONTRACT-v0.5 §14).  Sigmond invokes
# psk-recorder's own argparse subcommands; both honor the §14.3 env var
# bag (STATION_*, SIGMOND_INSTANCE, SIGMOND_RADIOD_STATUS) as defaults.
[contract.config]
init = ["/usr/local/bin/psk-recorder", "config", "init"]
edit = ["/usr/local/bin/psk-recorder", "config", "edit"]

[build]
steps = [
    "python3 -m venv /opt/git/sigmond/psk-recorder/venv",
    "/opt/git/sigmond/psk-recorder/venv/bin/pip install --upgrade pip setuptools wheel",
    "/opt/git/sigmond/psk-recorder/venv/bin/pip install -e /opt/git/sigmond/psk-recorder",
]
produces = [
    "/opt/git/sigmond/psk-recorder/venv/bin/psk-recorder",
]

[[install.steps]]
kind = "link"
src  = "/opt/git/sigmond/psk-recorder/venv/bin/psk-recorder"
dst  = "/usr/local/bin/psk-recorder"

[[install.steps]]
kind = "link"
src  = "systemd/psk-recorder@.service"
dst  = "/etc/systemd/system/psk-recorder@.service"

[[install.steps]]
kind     = "render"
src      = "config/psk-recorder-config.toml.template"
dst      = "/etc/psk-recorder/psk-recorder-config.toml"
if_absent = true

[[install.steps]]
kind = "mkdir"
dst  = "/var/lib/psk-recorder"
owner = "pskrec:pskrec"
mode  = "0755"

[[install.steps]]
kind = "mkdir"
dst  = "/var/log/psk-recorder"
owner = "pskrec:pskrec"
mode  = "0755"

[systemd]
units = ["psk-recorder@.service"]

[[deps.git]]
name       = "ft8_lib"
url        = "https://github.com/ka9q/ft8_lib.git"
note       = "provides /usr/local/bin/decode_ft8 — psk-recorder's FT4/FT8 decoder"

[[deps.git]]
name       = "ftlib-pskreporter"
url        = "https://github.com/pjsg/ftlib-pskreporter.git"
note       = "provides /usr/local/bin/pskreporter-sender (pip-installable)"

# decode_ft8 / pskreporter-sender used to be cloned by wsprdaemon-client's
# deps.conf — that's a v3 legacy.  In v4 these binaries belong to
# psk-recorder's install pipeline alone; wsprdaemon-client decodes only
# WSPR (W2/F2/F5/F15/F30) and never invokes them.

[[deps.pypi]]
name    = "ka9q-python"
version = "3.6.0"
venv    = "/opt/git/sigmond/psk-recorder/venv"

[[deps.apt]]
name = "whiptail"
note = "optional UI for `psk-recorder config init|edit` interactive wizard; absent → stdin-prompt fallback in configurator.py"

# ---------------------------------------------------------------------------
# Sigmond UI hooks (drop-in registration for `smd watch` + TUI Activity).
# Consumed by lib/sigmond/client_features.py.
# ---------------------------------------------------------------------------

[client_features.watch]
verb         = "psk"
description  = "PSK Reporter ft8/ft4 cycles + flushes"
verbose      = true
per_instance = true

[client_features.verifier]
verb         = "psk"
description  = "PSK Reporter upload audit (lost / in-flight / delivered / cadence)"
kind         = "spot_queue"
per_instance = true

[client_features.receiver_channels]
description  = "FT4/FT8 spot channels (per-mode freqs_hz)"
per_instance = true
parser_file  = "src/psk_recorder/sigmond_tui.py"
parser_attr  = "parse_receiver_channels"

# ---------------------------------------------------------------------------
# Single-host uploader pipeline (Stage 6).  `smd admin uploader manifest`
# reads this [[hs_uploader.pipeline]] block from every enabled client,
# substitutes per-site identity ({radiod_status} resolved from
# coordination.toml), and renders /etc/hs-uploader/pipelines.toml for the
# single-host daemon.  The block shape IS the [[pipeline]] shape
# hs_uploader.pipeline_factory consumes.
# ---------------------------------------------------------------------------

# PSK (FT8/FT4) + MSK144 spot rows -> pskreporter.info (TCP).
# This is the SHARED PSKReporter egress for the whole psk.spots stream:
# meteor-scatter writes its MSK144 rows into psk.spots (mode="msk144") too, so
# the mode filter includes msk144 and one pipeline delivers all three modes —
# the same unification the wsprdaemon server (wd30) uses. meteor-scatter
# declares an identical block; the generator dedups by name.
[[hs_uploader.pipeline]]
name = "psk-pskreporter"
batch_limit = 500
[hs_uploader.pipeline.source]
type = "sqlite"
database = "psk"
table = "spots"
accepted_schema_versions = [2]
start_at = "now"
delete_on_commit = false
select_columns = ["time", "frequency", "mode", "snr_db", "tx_call", "grid", "score", "message", "rx_source", "frequency_bucket_hz"]
extra_where = [["tx_call", "!=", ""], ["mode", "IN", ["ft8", "ft4", "msk144"]]]
[hs_uploader.pipeline.transport]
type = "pskreporter"
decoding_software = "psk-recorder/0.1 (radiod={radiod_status})"
[hs_uploader.pipeline.retry]
base = 2.0
cap_sec = 300.0

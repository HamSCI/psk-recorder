[package]
name             = "psk-recorder"
version          = "0.3.1"
contract_version = "0.6"
license          = "MIT"

# Configuration interview (CONTRACT-v0.5 §14).  Sigmond invokes
# psk-recorder's own argparse subcommands; both honor the §14.3 env var
# bag (STATION_*, SIGMOND_INSTANCE, SIGMOND_RADIOD_STATUS) as defaults.
[contract.config]
init = ["/usr/local/bin/psk-recorder", "config", "init"]
edit = ["/usr/local/bin/psk-recorder", "config", "edit"]

[build]
steps = [
    "python3 -m venv /opt/psk-recorder/venv",
    "/opt/psk-recorder/venv/bin/pip install --upgrade pip setuptools wheel",
    "/opt/psk-recorder/venv/bin/pip install -e /opt/git/sigmond/psk-recorder",
]
produces = [
    "/opt/psk-recorder/venv/bin/psk-recorder",
]

[[install.steps]]
kind = "link"
src  = "/opt/psk-recorder/venv/bin/psk-recorder"
dst  = "/usr/local/bin/psk-recorder"

[[install.steps]]
kind = "link"
src  = "systemd/psk-recorder@.service"
dst  = "/etc/systemd/system/psk-recorder@.service"

[[install.steps]]
kind     = "render"
src      = "config/psk-recorder-config.toml.template"
dst      = "/etc/psk-recorder/psk-recorder-config.toml"
if_absent = true

[[install.steps]]
kind = "mkdir"
dst  = "/var/lib/psk-recorder"
owner = "pskrec:pskrec"
mode  = "0755"

[[install.steps]]
kind = "mkdir"
dst  = "/var/log/psk-recorder"
owner = "pskrec:pskrec"
mode  = "0755"

# Bundled jt9 binaries (per-arch).  scripts/install.sh adds the
# arch-specific symlink to `jt9` after this copy lands; the symlink
# step is not yet expressible as a sigmond install kind, so operators
# using `smd install psk-recorder` should run the install.sh manually
# (or wait for the smd-install symlink-with-arch enhancement).
[[install.steps]]
kind = "copy"
src  = "bin/decoders"
dst  = "/opt/psk-recorder/bin/decoders"

[systemd]
units = ["psk-recorder@.service"]

# CONTRACT v0.6 §17 — local ClickHouse sink for `psk.spots`.  Schema
# files live in this repo (greenfield, not vendored).  When sigmond
# publishes SIGMOND_CLICKHOUSE_URL, an in-process tailer thread parses
# new lines from `<radiod_id>-{ft8,ft4}.log` and inserts rows into
# psk.spots in parallel with pskreporter-sender's existing PSKReporter
# upload path.  CH-disabled hosts stay file-only with no extra parts.
[clickhouse]
database         = "psk"
schema_dir       = "clickhouse/schema/psk"
# schema_version   = 1   — initial create_database + create_spots
schema_version   = 2     # 002_add_jt9_columns.sql adds snr_db,
                         # spectral_width_hz, decoder_kind
required_min_ch  = "23.8"

[deps]
# jt9 (default FT4/FT8 decoder) is bundled per-arch under
# bin/decoders/jt9-{x86,arm64,arm32}-v27 and installed by scripts/install.sh
# to /opt/psk-recorder/bin/decoders/.  We deliberately do NOT pull in the
# `wsjtx` package — it brings ~150 MB of Qt5Gui + sample sounds we don't
# need.  Only the minimum runtime shared libs jt9 dlopens are required:
[[deps.apt]]
name = "libqt5core5a"
note = "Qt5 core runtime — jt9's only Qt dep (no GUI libs needed)"

[[deps.apt]]
name = "libfftw3-single3"
note = "FFTW single-precision (libfftw3f) — jt9's FFT backend"

[[deps.apt]]
name = "libgfortran5"
note = "Fortran runtime — jt9 is built in Fortran"

[[deps.git]]
name       = "ka9q-radio"
url        = "https://github.com/ka9q/ka9q-radio.git"
note       = "provides decode_ft8 binary (decoder_kind=decode_ft8 fallback)"

[[deps.git]]
name       = "ftlib-pskreporter"
url        = "https://github.com/pjsg/ftlib-pskreporter.git"
note       = "provides pskreporter binary"

[[deps.pypi]]
name    = "ka9q-python"
version = "3.6.0"
venv    = "/opt/psk-recorder/venv"
